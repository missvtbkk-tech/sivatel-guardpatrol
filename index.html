<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Sivatel Patrol App</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel (Pinned to stable version 7.23.10 to fix the module import error) -->
  <script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>
  
  <!-- jsQR -->
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  
  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');
    
    html, body {
      font-family: 'Sarabun', sans-serif;
      -webkit-tap-highlight-color: transparent;
      background-color: #f1f5f9;
      overscroll-behavior-y: contain;
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden; 
    }
    #root {
      height: 100%;
      width: 100%;
    }
    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .img-thumbnail {
      object-fit: cover;
      transition: transform 0.2s;
    }
    .img-thumbnail:active {
      transform: scale(0.95);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React App Code -->
  <script type="text/babel" data-presets="react,env">
    const { useState, useEffect, useRef } = React;

    const getDisplayImageUrl = (url) => {
      if (!url) return '';
      let id = null;
      const matchId = url.match(/id=([^&]+)/);
      if (matchId) {
         id = matchId[1];
      } else {
         const matchD = url.match(/\/file\/d\/([^\/\?]+)/);
         if (matchD) id = matchD[1];
      }
      if (id) {
         return `https://lh3.googleusercontent.com/d/${id}`;
      }
      return url; 
    };

    const formatTimestamp = (ts) => {
      if (!ts) return '';
      try {
        const d = new Date(ts);
        if (!isNaN(d.getTime())) {
          const formatter = new Intl.DateTimeFormat('en-GB', {
            timeZone: 'Asia/Bangkok',
            year: 'numeric',
            month: '2-digit',
            day: '2-digit',
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit',
            hour12: false
          });
          const parts = formatter.formatToParts(d);
          const obj = {};
          parts.forEach(p => obj[p.type] = p.value);
          return `${obj.year}-${obj.month}-${obj.day} ${obj.hour}:${obj.minute}:${obj.second}`;
        }
      } catch(e) {}
      return String(ts).split(' GMT')[0];
    };

    function App() {
      const [view, setView] = useState('home'); 
      const [isLoadingData, setIsLoadingData] = useState(true);
      const [isOnline, setIsOnline] = useState(true); 
      
      const [guards, setGuards] = useState(() => JSON.parse(localStorage.getItem('patrolGuards')) || [{id:'1', name:'ณรงค์'}, {id:'2', name:'ปัญญา(G1)'}, {id:'3', name:'โอ๋'}]);
      const [checkpoints, setCheckpoints] = useState(() => JSON.parse(localStorage.getItem('patrolCheckpoints')) || [{id:'1', name:'FL17 หน้าตู้ FHC'}, {id:'2', name:'FL1A ตู้ FHC ลิฟท์ L1'}]);
      const [history, setHistory] = useState(() => JSON.parse(localStorage.getItem('patrolHistory')) || []);

      const [guardName, setGuardName] = useState(() => localStorage.getItem('currentGuard') || '');
      const [currentCheckpoint, setCurrentCheckpoint] = useState('');
      
      const [status, setStatus] = useState('ปกติ');
      const [issueDetail, setIssueDetail] = useState('');
      const [doorOpen, setDoorOpen] = useState('ไม่มี');
      const [roomNumber, setRoomNumber] = useState('');
      const [photos, setPhotos] = useState([]);
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [isCompressing, setIsCompressing] = useState(false); 

      const [settingTab, setSettingTab] = useState('checkpoints');
      const [newItemName, setNewItemName] = useState('');
      const [showQR, setShowQR] = useState(null);
      const [editingId, setEditingId] = useState(null);
      const [editingValue, setEditingValue] = useState('');

      const [selectedRecord, setSelectedRecord] = useState(null);

      const [adminPassword, setAdminPassword] = useState(() => localStorage.getItem('adminPassword') || '1234');
      const [isAdminAuth, setIsAdminAuth] = useState(false);
      const [loginInput, setLoginInput] = useState('');
      const [showPasswordChange, setShowPasswordChange] = useState(false);
      const [oldPasswordInput, setOldPasswordInput] = useState('');
      const [newPasswordInput, setNewPasswordInput] = useState('');

      const todayFormatted = formatTimestamp(new Date()).split(' ')[0];
      const [startDate, setStartDate] = useState(todayFormatted);
      const [endDate, setEndDate] = useState(todayFormatted);

      // สำคัญ: URL นี้ต้องเป็น Web App URL ของ Google Apps Script ที่ Deploy ไว้
      const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwO8lwqHMe1KGFOy8qgnm8xSLKL6IPR__ujsrqDacZSDivBtrRWjKp7D_8_QJM4O5Im/exec';

      const fetchCloudData = async (silent = false) => {
        if (!silent) setIsLoadingData(true);
        try {
          const res = await fetch(`${GOOGLE_SCRIPT_URL}?action=getData`);
          if (!res.ok) throw new Error('Network response was not ok');
          const textResponse = await res.text();
          
          if (textResponse.includes("✅")) {
            console.warn("ตรวจพบ API เวอร์ชันเก่า กรุณาอัปเดต Google Apps Script");
            setIsLoadingData(false);
            return;
          }

          const data = JSON.parse(textResponse);
          if (data.status === 'success') {
            setIsOnline(true);
            setGuards(data.guards);
            setCheckpoints(data.checkpoints);
            
            const processedHistory = data.history.map(item => {
               const rawPhotos = item.photos || item.photoText || '';
               const combinedText = Array.isArray(rawPhotos) ? rawPhotos.join(' ') : String(rawPhotos);
               const urlRegex = /(https?:\/\/[^\s,\|"']+|data:image\/[^\s,\|"']+)/g;
               const urls = combinedText.match(urlRegex) || [];
               return { ...item, photos: urls, timestamp: formatTimestamp(item.timestamp) };
            });

            setHistory(processedHistory);
            localStorage.setItem('patrolGuards', JSON.stringify(data.guards));
            localStorage.setItem('patrolCheckpoints', JSON.stringify(data.checkpoints));
            
            try {
              localStorage.setItem('patrolHistory', JSON.stringify(processedHistory.slice(0, 100)));
            } catch (storageError) {
              localStorage.setItem('patrolHistory', JSON.stringify(processedHistory.slice(0, 30)));
            }
          }
        } catch (err) {
          console.warn('โหมดออฟไลน์:', err.message);
          setIsOnline(false);
        } finally {
          if (!silent) setIsLoadingData(false);
        }
      };

      useEffect(() => {
        fetchCloudData(); 
        const syncInterval = setInterval(() => fetchCloudData(true), 30000);
        return () => clearInterval(syncInterval);
      }, []);

      useEffect(() => {
        if (view === 'dashboard' || view === 'history') fetchCloudData(true);
      }, [view]);

      useEffect(() => {
        if (guardName) localStorage.setItem('currentGuard', guardName);
        else localStorage.removeItem('currentGuard');
      }, [guardName]);

      const resetForm = () => {
        setStatus('ปกติ');
        setIssueDetail('');
        setDoorOpen('ไม่มี');
        setRoomNumber('');
        setPhotos([]);
      };

      const compressImage = (file) => {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.readAsDataURL(file);
          reader.onload = (event) => {
            const img = new Image();
            img.src = event.target.result;
            img.onload = () => {
              const canvas = document.createElement('canvas');
              const MAX_WIDTH = 1024;
              const MAX_HEIGHT = 1024;
              let width = img.width;
              let height = img.height;

              if (width > height) {
                if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
              } else {
                if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
              }
              canvas.width = width;
              canvas.height = height;
              const ctx = canvas.getContext('2d');
              ctx.drawImage(img, 0, 0, width, height);
              const dataUrl = canvas.toDataURL('image/jpeg', 0.6);
              resolve(dataUrl);
            };
            img.onerror = (e) => reject(e);
          };
          reader.onerror = (e) => reject(e);
        });
      };

      const handleSubmit = async (e) => {
        e.preventDefault();
        
        if (photos.length === 0) {
          alert('กรุณาถ่ายภาพหรือแนบรูปภาพอย่างน้อย 1 รูป เพื่อยืนยันการตรวจ');
          return;
        }

        setIsSubmitting(true);
        const timestampStr = formatTimestamp(new Date());
        
        const newRecord = {
          id: Date.now().toString(),
          timestamp: timestampStr,
          checkpoint: currentCheckpoint,
          guardName,
          status,
          issueDetail: status === 'ผิดปกติ' ? issueDetail : '',
          doorOpen,
          roomNumber: doorOpen === 'มี' ? roomNumber : '',
          photoText: photos.length > 0 ? `แนบรูปแล้ว` : 'ไม่มีรูปภาพ',
          photos: photos 
        };

        const updatedHistory = [newRecord, ...history];
        setHistory(updatedHistory);
        
        try {
          localStorage.setItem('patrolHistory', JSON.stringify(updatedHistory.slice(0, 50)));
        } catch (storageError) {
          localStorage.setItem('patrolHistory', JSON.stringify(updatedHistory.slice(0, 20)));
        }
        
        setView('dashboard');
        resetForm();

        try {
          const payload = { ...newRecord, action: 'savePatrol' };
          await fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
        } catch (error) {
          console.warn("บันทึกข้อมูลแบบออฟไลน์สำเร็จ:", error.message);
          setIsOnline(false);
        } finally {
          setIsSubmitting(false);
        }
      };

      const saveSettingsToCloud = async (newGuards, newCheckpoints) => {
        try {
          await fetch(GOOGLE_SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              action: 'saveSettings',
              guards: newGuards.map(g => g.name),
              checkpoints: newCheckpoints.map(c => c.name)
            })
          });
        } catch (e) {
          console.warn("บันทึกการตั้งค่าออฟไลน์สำเร็จ:", e.message);
          setIsOnline(false);
        }
      };

      const handleAddItem = (e) => {
        e.preventDefault();
        if (!newItemName.trim()) return;
        const newItem = { id: Date.now().toString(), name: newItemName.trim() };
        
        if (settingTab === 'checkpoints') {
          const newArr = [...checkpoints, newItem];
          setCheckpoints(newArr);
          localStorage.setItem('patrolCheckpoints', JSON.stringify(newArr));
          saveSettingsToCloud(guards, newArr);
        } else {
          const newArr = [...guards, newItem];
          setGuards(newArr);
          localStorage.setItem('patrolGuards', JSON.stringify(newArr));
          saveSettingsToCloud(newArr, checkpoints);
        }
        setNewItemName('');
      };

      const handleDeleteItem = (id) => {
        if (confirm('คุณแน่ใจหรือไม่ที่จะลบรายการนี้?')) {
          if (settingTab === 'checkpoints') {
            const newArr = checkpoints.filter(c => c.id !== id);
            setCheckpoints(newArr);
            localStorage.setItem('patrolCheckpoints', JSON.stringify(newArr));
            saveSettingsToCloud(guards, newArr);
          } else {
            const newArr = guards.filter(g => g.id !== id);
            setGuards(newArr);
            localStorage.setItem('patrolGuards', JSON.stringify(newArr));
            saveSettingsToCloud(newArr, checkpoints);
          }
        }
      };

      const handleStartEdit = (id, value) => {
        setEditingId(id);
        setEditingValue(value);
      };

      const handleSaveEdit = () => {
        if (!editingValue.trim()) return;
        if (settingTab === 'checkpoints') {
          const newArr = checkpoints.map(c => c.id === editingId ? { ...c, name: editingValue.trim() } : c);
          setCheckpoints(newArr);
          localStorage.setItem('patrolCheckpoints', JSON.stringify(newArr));
          saveSettingsToCloud(guards, newArr);
        } else {
          const newArr = guards.map(g => g.id === editingId ? { ...g, name: editingValue.trim() } : g);
          setGuards(newArr);
          localStorage.setItem('patrolGuards', JSON.stringify(newArr));
          saveSettingsToCloud(newArr, checkpoints);
        }
        setEditingId(null);
        setEditingValue('');
      };

      const handlePhotoCapture = async (e) => {
        if (e.target.files && e.target.files.length > 0) {
          const newFiles = Array.from(e.target.files);
          const remainingSlots = 10 - photos.length;
          const filesToAdd = newFiles.slice(0, remainingSlots);
          
          setIsCompressing(true); 
          
          try {
            const compressedPhotos = await Promise.all(filesToAdd.map(file => compressImage(file)));
            setPhotos(prev => [...prev, ...compressedPhotos]);
            
            if (newFiles.length > remainingSlots) {
              alert(`แนบรูปได้สูงสุด 10 รูปเท่านั้น`);
            }
          } catch (error) {
            console.error("Error compressing images:", error);
            alert("เกิดข้อผิดพลาดในการประมวลผลรูปภาพ กรุณาลองใหม่อีกครั้ง");
          } finally {
            setIsCompressing(false); 
          }
        }
      };

      const removePhoto = (indexToRemove) => setPhotos(photos.filter((_, index) => index !== indexToRemove));

      const exportToCSV = (dataToExport = history) => {
        if (dataToExport.length === 0) { alert("ไม่มีข้อมูลสำหรับส่งออก"); return; }
        const headers = ['Timestamp', 'จุดตรวจ ', 'ชื่อผู้ตรวจจุด', 'สถานการณ์ ณ จุดตรวจ', 'ระบุเหตุที่พบ', 'มีประตูห้องพักถูกเปิดอยู่หรือไม่', 'โปรดระบุห้องพักที่เปิดอยู่', 'ภาพถ่าย ณ จุดตรวจ'];
        const csvRows = [
          headers.join(','),
          ...dataToExport.map(row => {
            const photoData = row.photos && row.photos.length > 0 ? row.photos.join(' | ') : row.photoText;
            return [
              row.timestamp, `"${row.checkpoint}"`, `"${row.guardName}"`, row.status,
              `"${row.issueDetail}"`, row.doorOpen, `"${row.roomNumber}"`, `"${photoData}"` 
            ].join(',');
          })
        ];
        const csvContent = "data:text/csv;charset=utf-8,\uFEFF" + csvRows.join('\n');
        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", `patrol_export_${startDate}_to_${endDate}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      const videoRef = useRef(null);
      const canvasRef = useRef(null);
      const [scanError, setScanError] = useState('');
      const scanCooldownRef = useRef(false);

      useEffect(() => {
        let stream = null;
        let animationFrameId;

        const startCamera = async () => {
          setScanError('');
          if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            console.error("Media devices API not available.");
            setScanError("เบราว์เซอร์ของคุณไม่รองรับการเปิดกล้อง แนะนำให้ใช้งานผ่านแอป Safari หรือ Chrome");
            return;
          }

          try {
            // ใช้ ideal แทน exact เพื่อลดปัญหาบนมือถือบางรุ่น
            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: "environment" } } });
          } catch (err1) {
            console.warn("ไม่พบกล้องหลัง ลองกล้องหน้าแทน", err1);
            try {
              stream = await navigator.mediaDevices.getUserMedia({ video: true });
            } catch (err2) {
              console.error("Camera access failed:", err2);
              const isLine = navigator.userAgent.includes("Line");
              const isFB = navigator.userAgent.includes("FBAV") || navigator.userAgent.includes("FBAN");
              
              if (isLine || isFB) {
                 setScanError("คุณกำลังเปิดผ่านแอป LINE/Facebook ซึ่งบล็อกการเปิดกล้อง กรุณากดปุ่ม 3 จุดมุมขวาบน แล้วเลือก 'เปิดด้วยเบราว์เซอร์อื่น' (Safari/Chrome)");
              } else if (err2.name === 'NotAllowedError' || err2.name === 'PermissionDeniedError') {
                 setScanError("คุณยังไม่ได้อนุญาตให้เบราว์เซอร์เข้าถึงกล้อง กรุณาไปที่การตั้งค่าของอุปกรณ์เพื่ออนุญาต");
              } else if (err2.name === 'NotFoundError' || err2.name === 'DevicesNotFoundError') {
                 setScanError("ไม่พบอุปกรณ์กล้องบนเครื่องของคุณ");
              } else {
                 setScanError("เกิดข้อผิดพลาดในการเปิดกล้อง: " + err2.message);
              }
              return; 
            }
          }

          if (videoRef.current && stream) {
            videoRef.current.srcObject = stream;
            videoRef.current.setAttribute("playsinline", "true");
            videoRef.current.setAttribute("autoplay", "true");
            videoRef.current.setAttribute("muted", "true");
            videoRef.current.style.pointerEvents = "none";
            
            try {
              await videoRef.current.play();
            } catch (error) {
              console.error("Video play error:", error);
              setScanError("ไม่สามารถเริ่มการทำงานของกล้องได้ กรุณากดกลับแล้วลองใหม่");
            }
            requestAnimationFrame(tick);
          }
        };

        const tick = () => {
          if (videoRef.current && videoRef.current.readyState === videoRef.current.HAVE_ENOUGH_DATA) {
            const video = videoRef.current;
            const canvas = canvasRef.current;
            if (!canvas) return;
            
            const context = canvas.getContext("2d", { willReadFrequently: true });
            canvas.height = video.videoHeight;
            canvas.width = video.videoWidth;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            const imageData = context.getImageData(0, 0, canvas.width, canvas.height);
            
            if (window.jsQR && !scanCooldownRef.current) {
              const code = window.jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: "dontInvert" });
              if (code && code.data) {
                const isValid = handleScanSuccess(code.data);
                if (isValid) return; 
              }
            }
          }
          if (view === 'scanner') animationFrameId = requestAnimationFrame(tick);
        };

        if (view === 'scanner') {
          scanCooldownRef.current = false;
          startCamera();
        }

        return () => {
          if (stream) stream.getTracks().forEach(track => track.stop());
          if (animationFrameId) cancelAnimationFrame(animationFrameId);
        };
      }, [view]);

      const handleScanSuccess = (scannedData) => {
        let finalCheckpointName = scannedData;

        if (scannedData.startsWith('http')) {
          try {
            const url = new URL(scannedData);
            const param = url.searchParams.get('cp') || url.searchParams.get('checkpoint') || url.searchParams.get('name') || url.searchParams.get('id');
            if (param) {
              finalCheckpointName = param;
            } else {
              const pathParts = url.pathname.split('/').filter(Boolean);
              if (pathParts.length > 0) {
                finalCheckpointName = decodeURIComponent(pathParts[pathParts.length - 1]);
              }
            }
          } catch (e) {
            console.error("URL Parsing error", e);
          }
        }

        const matchedCheckpoint = checkpoints.find(c => 
          c.name === finalCheckpointName || 
          c.id === finalCheckpointName ||
          scannedData.includes(c.name) 
        );

        if (matchedCheckpoint) {
          setCurrentCheckpoint(matchedCheckpoint.name);
          resetForm();
          setView('form');
          return true; 
        } else {
          scanCooldownRef.current = true;
          alert(`ไม่พบจุดตรวจนี้ในระบบ\n\nข้อมูลที่สแกนได้: ${finalCheckpointName}`);
          setTimeout(() => { scanCooldownRef.current = false; }, 3000); 
          return false; 
        }
      };

      const handleSimulateScan = () => {
        const activeCheckpoints = checkpoints.length > 0 ? checkpoints.map(c => c.name) : ['จุดตรวจทดสอบ'];
        const randomPoint = activeCheckpoints[Math.floor(Math.random() * activeCheckpoints.length)];
        handleScanSuccess(randomPoint);
      };

      const handleAdminLogin = (e) => {
        e.preventDefault();
        if (loginInput === adminPassword) {
          setIsAdminAuth(true);
          setLoginInput('');
        } else { alert('รหัสผ่านไม่ถูกต้อง'); }
      };

      const handleChangePassword = (e) => {
        e.preventDefault();
        if (oldPasswordInput !== adminPassword) { alert('รหัสผ่านเดิมไม่ถูกต้อง'); return; }
        if (newPasswordInput.length < 4) { alert('รหัสผ่านใหม่ต้องมีอย่างน้อย 4 ตัวอักษร'); return; }
        setAdminPassword(newPasswordInput);
        localStorage.setItem('adminPassword', newPasswordInput);
        setShowPasswordChange(false);
        setOldPasswordInput(''); setNewPasswordInput('');
        alert('เปลี่ยนรหัสผ่านสำเร็จ!');
      };

      const handleExportAllQRs = () => {
        if (checkpoints.length === 0) {
          alert('ไม่มีจุดตรวจให้ส่งออก');
          return;
        }

        let htmlContent = `
<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sivatel Patrol - พิมพ์ QR Code ทั้งหมด</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap');
    body { font-family: 'Sarabun', sans-serif; background: #f8fafc; padding: 20px; color: #1e293b; text-align: center; }
    .header { margin-bottom: 30px; }
    .header button { background: #2563eb; color: white; border: none; padding: 12px 24px; font-size: 16px; border-radius: 8px; cursor: pointer; font-family: 'Sarabun', sans-serif; font-weight: bold; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); transition: all 0.2s; }
    .header button:hover { background: #1d4ed8; transform: translateY(-1px); }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; max-width: 1000px; margin: 0 auto; }
    .qr-card { background: white; border: 2px dashed #cbd5e1; padding: 20px; border-radius: 16px; display: flex; flex-direction: column; align-items: center; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); page-break-inside: avoid; break-inside: avoid; }
    .qr-card img { width: 100%; max-width: 150px; aspect-ratio: 1/1; margin: 0 auto 15px auto; display: block; }
    .qr-title { font-size: 16px; font-weight: bold; word-break: break-word; line-height: 1.3; }
    @media print {
      body { background: white; padding: 0; }
      .header { display: none; }
      .grid { grid-template-columns: repeat(3, 1fr); gap: 15px; }
      .qr-card { border: 1px solid #000; box-shadow: none; border-radius: 0; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h2>QR Code จุดตรวจทั้งหมด (${checkpoints.length} จุด)</h2>
    <p>สามารถกดปุ่มด้านล่างเพื่อสั่งพิมพ์ (Print) หรือบันทึกเป็น PDF เพื่อนำไปติดที่จุดตรวจได้เลย</p>
    <button onclick="window.print()">🖨️ สั่งพิมพ์ (Print)</button>
  </div>
  <div class="grid">
        `;

        checkpoints.forEach(cp => {
          const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=500x500&data=${encodeURIComponent(cp.name)}`;
          htmlContent += `
    <div class="qr-card">
      <img src="${qrUrl}" alt="${cp.name}" crossorigin="anonymous" />
      <div class="qr-title">${cp.name}</div>
    </div>
          `;
        });

        htmlContent += `
  </div>
</body>
</html>
        `;

        const blob = new Blob([htmlContent], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        const printWindow = window.open(url, '_blank');
        
        if (!printWindow) {
          const a = document.createElement('a');
          a.href = url;
          a.download = 'patrol_qrcodes_print.html';
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          alert('ระบบได้ดาวน์โหลดไฟล์เพื่อพิมพ์ QR Code แล้ว (เนื่องจาก Popup ถูกบล็อก)\n\nกรุณาเปิดไฟล์ที่โหลดเพื่อสั่งพิมพ์ครับ');
        }
      };

      const renderHome = () => (
        <div className="flex flex-col h-full p-6 justify-center items-center bg-slate-50">
          <div className="w-24 h-24 bg-blue-600 text-white rounded-full flex items-center justify-center mb-6 shadow-lg">
            <i className="fas fa-qrcode text-[48px]"></i>
          </div>
          <h1 className="text-2xl font-bold text-slate-800 mb-2">Sivatel Patrol</h1>
          
          {isOnline ? (
            <p className="text-green-600 mb-8 text-center bg-green-100 px-3 py-1 rounded-full text-xs font-bold flex items-center gap-1 shadow-sm border border-green-200">
              <i className="fas fa-check-circle"></i> เชื่อมต่อข้อมูล Google Sheets สำเร็จ
            </p>
          ) : (
            <p className="text-amber-600 mb-8 text-center bg-amber-100 px-3 py-1 rounded-full text-xs font-bold flex items-center gap-1 shadow-sm border border-amber-200">
              <i className="fas fa-exclamation-circle"></i> โหมดออฟไลน์ (ใช้งานข้อมูลในเครื่อง)
            </p>
          )}

          {guardName ? (
            <div className="w-full max-w-sm bg-white p-6 rounded-2xl shadow-sm border border-slate-200 text-center animate-in fade-in zoom-in duration-300">
              <p className="text-sm text-slate-500 mb-1">เข้าสู่ระบบในชื่อ</p>
              <div className="inline-flex items-center justify-center gap-2 text-2xl font-bold text-blue-600 mb-4 bg-blue-50 px-4 py-2 rounded-xl">
                <i className="fas fa-user-circle"></i> {guardName}
              </div>
              <button onClick={() => setGuardName('')} className="block mx-auto text-sm text-slate-400 underline mb-8 hover:text-slate-600">
                เปลี่ยนผู้ปฏิบัติงาน (ออกจากระบบ)
              </button>
              <button onClick={() => setView('scanner')} className="w-full py-4 rounded-xl font-bold text-white flex items-center justify-center gap-2 bg-blue-600 shadow-lg shadow-blue-200 hover:bg-blue-700 active:scale-95 transition-all text-lg">
                <i className="fas fa-camera text-[20px]"></i> เริ่มสแกนจุดตรวจ
              </button>
            </div>
          ) : (
            <div className="w-full max-w-sm bg-white p-6 rounded-2xl shadow-sm border border-slate-200 animate-in fade-in slide-in-from-bottom-4">
              <label className="block text-sm font-medium text-slate-700 mb-2 text-center">กรุณาเลือกชื่อผู้ปฏิบัติงาน</label>
              <select 
                className="w-full p-4 border-2 border-slate-200 rounded-xl mb-6 focus:ring-0 focus:border-blue-500 text-center text-lg font-medium bg-slate-50"
                value={guardName}
                onChange={(e) => setGuardName(e.target.value)}
              >
                <option value="">-- เลือกรายชื่อ รปภ. --</option>
                {guards.map((g) => <option key={g.id} value={g.name}>{g.name}</option>)}
              </select>
              <button 
                disabled={!guardName}
                onClick={() => setView('scanner')}
                className={`w-full py-4 rounded-xl font-bold text-white flex items-center justify-center gap-2 transition-all ${
                  guardName ? 'bg-blue-600 shadow-lg shadow-blue-200 hover:bg-blue-700 active:scale-95' : 'bg-slate-200 text-slate-400 cursor-not-allowed'
                }`}
              >
                <i className="fas fa-sign-in-alt text-[20px]"></i> เข้าสู่ระบบ
              </button>
            </div>
          )}
        </div>
      );

      const renderDashboard = () => {
        const filteredHistory = history.filter(h => {
          const recordDate = h.timestamp.split(' ')[0]; 
          return recordDate >= startDate && recordDate <= endDate;
        });
        
        const abnormalList = filteredHistory.filter(h => h.status === 'ผิดปกติ');
        const openDoorsList = filteredHistory.filter(h => h.doorOpen === 'มี');

        const totalScans = filteredHistory.length;
        const abnormalScans = abnormalList.length;
        const openDoors = openDoorsList.length;
        const normalScans = totalScans - abnormalScans;
        const recentActivity = filteredHistory.slice(0, 5); 

        const guardStats = {};
        filteredHistory.forEach(curr => {
          const name = curr.guardName;
          const safeTsStr = curr.timestamp.replace(' ', 'T');
          const ts = new Date(safeTsStr).getTime();

          if (!guardStats[name]) {
            guardStats[name] = { count: 0, minTs: ts, maxTs: ts };
          }
          guardStats[name].count += 1;
          
          if (!isNaN(ts)) {
            if (ts < guardStats[name].minTs) guardStats[name].minTs = ts;
            if (ts > guardStats[name].maxTs) guardStats[name].maxTs = ts;
          }
        });
        
        const guardStatsArray = Object.entries(guardStats).map(([name, data]) => {
          const diffMs = data.maxTs - data.minTs;
          const diffMins = Math.floor(diffMs / 60000);
          
          let durationText = "ไม่ทราบเวลา";
          if (data.count === 1) {
             durationText = "สแกน 1 จุด";
          } else if (diffMins === 0) {
             durationText = "น้อยกว่า 1 นาที";
          } else if (diffMins < 60) {
             durationText = `${diffMins} นาที`;
          } else {
             const hrs = Math.floor(diffMins / 60);
             const mins = diffMins % 60;
             durationText = mins > 0 ? `${hrs} ชม. ${mins} นาที` : `${hrs} ชม.`;
          }
          
          return { name, count: data.count, duration: durationText };
        }).sort((a, b) => b.count - a.count);

        return (
          <div className="flex flex-col h-full bg-slate-50 overflow-y-auto pb-4 animate-in fade-in">
            <div className="bg-blue-600 text-white p-6 pt-8 rounded-b-3xl shadow-md">
              <h1 className="text-2xl font-bold mb-4">ภาพรวมการปฏิบัติงาน</h1>
              
              <div className="flex gap-2 max-w-lg">
                <div className="flex-1 bg-white/20 rounded-xl p-2">
                  <div className="text-[10px] text-blue-100 mb-1">จากวันที่</div>
                  <input 
                    type="date" 
                    value={startDate} 
                    onChange={(e) => setStartDate(e.target.value)}
                    className="w-full bg-transparent text-white text-sm outline-none border-none p-0 focus:ring-0"
                    style={{ colorScheme: 'dark' }}
                  />
                </div>
                <div className="flex-1 bg-white/20 rounded-xl p-2">
                  <div className="text-[10px] text-blue-100 mb-1">ถึงวันที่</div>
                  <input 
                    type="date" 
                    value={endDate} 
                    onChange={(e) => setEndDate(e.target.value)}
                    className="w-full bg-transparent text-white text-sm outline-none border-none p-0 focus:ring-0"
                    style={{ colorScheme: 'dark' }}
                  />
                </div>
              </div>
            </div>

            <div className="grid grid-cols-2 gap-3 p-4 mt-2">
              <div className="bg-white p-3 rounded-2xl shadow-sm border border-slate-100 flex flex-col items-center justify-center">
                <div className="w-10 h-10 bg-blue-50 text-blue-500 rounded-full flex items-center justify-center mb-1"><i className="fas fa-qrcode text-lg"></i></div>
                <span className="text-2xl font-bold text-slate-800">{totalScans}</span>
                <span className="text-[11px] text-slate-500 font-medium">จุดตรวจทั้งหมด</span>
              </div>
              <div className="bg-white p-3 rounded-2xl shadow-sm border border-slate-100 flex flex-col items-center justify-center">
                <div className="w-10 h-10 bg-green-50 text-green-500 rounded-full flex items-center justify-center mb-1"><i className="fas fa-check-circle text-lg"></i></div>
                <span className="text-2xl font-bold text-green-600">{normalScans}</span>
                <span className="text-[11px] text-slate-500 font-medium">สถานการณ์ปกติ</span>
              </div>
              
              <div className="bg-white p-4 rounded-2xl shadow-sm border border-red-100 flex flex-col items-center justify-center col-span-2">
                <div className="flex flex-col items-center mb-2">
                  <div className="w-12 h-12 bg-red-50 text-red-500 rounded-full flex items-center justify-center mb-2"><i className="fas fa-exclamation-triangle text-xl"></i></div>
                  <span className="text-3xl font-bold text-red-600 leading-none mb-1">{abnormalScans}</span>
                  <span className="text-xs text-slate-500 font-medium block">พบสิ่งผิดปกติ</span>
                </div>
                {abnormalList.length > 0 && (
                  <div className="w-full mt-3 pt-3 border-t border-red-50 space-y-2 max-h-48 overflow-y-auto hide-scrollbar">
                    {abnormalList.map((item, i) => (
                      <div key={i} onClick={() => setSelectedRecord(item)} className="bg-red-50 p-2.5 rounded-xl flex flex-col gap-1 text-left w-full border border-red-100 cursor-pointer hover:bg-red-200 transition-colors active:scale-[0.98]">
                        <div className="flex justify-between items-start gap-2">
                          <p className="text-[13px] font-bold text-red-700 leading-tight">{item.checkpoint}</p>
                          <span className="text-[10px] text-red-500 shrink-0 bg-red-100 px-1.5 py-0.5 rounded font-medium">{item.timestamp.split(' ')[1]}</span>
                        </div>
                        <p className="text-xs text-red-600"><i className="fas fa-info-circle mr-1"></i>{item.issueDetail}</p>
                        <p className="text-[10px] text-red-400 mt-1">ผู้ตรวจ: {item.guardName}</p>
                      </div>
                    ))}
                  </div>
                )}
              </div>

              <div className="bg-white p-4 rounded-2xl shadow-sm border border-orange-100 flex flex-col items-center justify-center col-span-2">
                <div className="flex flex-col items-center mb-2">
                  <div className="w-12 h-12 bg-orange-50 text-orange-500 rounded-full flex items-center justify-center mb-2"><i className="fas fa-door-open text-xl"></i></div>
                  <span className="text-3xl font-bold text-orange-600 leading-none mb-1">{openDoors}</span>
                  <span className="text-xs text-slate-500 font-medium block">พบห้องพักเปิดอยู่</span>
                </div>
                {openDoorsList.length > 0 && (
                  <div className="w-full mt-3 pt-3 border-t border-orange-50 space-y-2 max-h-48 overflow-y-auto hide-scrollbar">
                    {openDoorsList.map((item, i) => (
                      <div key={i} onClick={() => setSelectedRecord(item)} className="bg-orange-50 p-2.5 rounded-xl flex items-center justify-between gap-2 text-left border border-orange-100 cursor-pointer hover:bg-orange-200 transition-colors active:scale-[0.98]">
                        <div className="flex-1 min-w-0">
                          <p className="text-[13px] font-bold text-orange-700 leading-tight truncate">{item.checkpoint}</p>
                          <p className="text-[10px] text-orange-500 mt-1">เวลา: {item.timestamp.split(' ')[1]} • ผู้ตรวจ: {item.guardName}</p>
                        </div>
                        <div className="shrink-0 bg-orange-500 text-white px-3 py-1.5 rounded-lg text-sm font-bold shadow-sm">
                          ห้อง {item.roomNumber}
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>

            <div className="px-4 mt-2">
              <h2 className="font-bold text-slate-800 mb-3 flex items-center justify-between">
                <span>ยอดสแกนแยกตามผู้ปฏิบัติงาน</span>
              </h2>
              <div className="space-y-2">
                {guardStatsArray.length === 0 ? (
                  <p className="text-center text-slate-400 py-3 text-sm bg-white rounded-xl border border-dashed border-slate-200">ไม่มีข้อมูลในช่วงเวลานี้</p>
                ) : (
                  guardStatsArray.map((stat, idx) => (
                    <div key={idx} className="bg-white p-3 rounded-xl shadow-sm border border-slate-100 flex items-center justify-between">
                      <div className="flex items-center gap-3">
                        <div className="w-9 h-9 rounded-full bg-blue-50 text-blue-600 flex items-center justify-center shrink-0">
                          <i className="fas fa-user-shield text-[14px]"></i>
                        </div>
                        <div className="flex flex-col">
                          <span className="font-semibold text-sm text-slate-700">{stat.name}</span>
                          <span className="text-[10px] text-slate-500 font-medium flex items-center gap-1 mt-0.5"><i className="far fa-clock"></i> ใช้เวลา: <span className="text-blue-600">{stat.duration}</span></span>
                        </div>
                      </div>
                      <div className="text-right">
                        <span className="text-lg font-bold text-blue-600">{stat.count}</span>
                        <span className="text-xs text-slate-500 ml-1">จุด</span>
                      </div>
                    </div>
                  ))
                )}
              </div>
            </div>

            <div className="px-4 mt-5 mb-4">
              <h2 className="font-bold text-slate-800 mb-3 flex items-center justify-between">
                <span>อัปเดตล่าสุด <i className="fas fa-sync-alt ml-1 text-slate-400 text-[10px] cursor-pointer" onClick={() => fetchCloudData()}></i> {!isOnline && <span className="text-[10px] text-amber-500 font-normal ml-1">(ออฟไลน์)</span>}</span>
                <button onClick={() => setView('history')} className="text-xs text-blue-600 font-semibold hover:underline">ดูทั้งหมด</button>
              </h2>
              <div className="space-y-3">
                {recentActivity.length === 0 ? (
                  <p className="text-center text-slate-400 py-4 text-sm bg-white rounded-xl border border-dashed border-slate-200">ยังไม่มีข้อมูลในช่วงเวลานี้</p>
                ) : (
                  recentActivity.map((item, idx) => (
                    <div key={idx} onClick={() => setSelectedRecord(item)} className="bg-white p-3 rounded-xl shadow-sm border border-slate-100 flex items-center gap-3 cursor-pointer hover:bg-slate-50 transition-colors active:scale-[0.98]">
                      <div className={`w-10 h-10 rounded-full flex items-center justify-center shrink-0 ${item.status === 'ปกติ' ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'}`}>
                        <i className={`fas ${item.status === 'ปกติ' ? 'fa-check' : 'fa-exclamation'}`}></i>
                      </div>
                      <div className="flex-1 overflow-hidden">
                        <p className="font-bold text-sm text-slate-800 truncate">{item.checkpoint}</p>
                        <p className="text-xs text-slate-500">
                          {item.timestamp.includes(' ') ? item.timestamp.split(' ')[1] : item.timestamp} น. • {item.guardName}
                        </p>
                      </div>
                    </div>
                  ))
                )}
              </div>
            </div>
          </div>
        );
      };

      const renderScanner = () => (
        <div className="flex flex-col h-full bg-black text-white relative">
          <div className="p-4 flex items-center justify-between bg-slate-900 z-10">
            <button onClick={() => setView('home')} className="text-white p-2 text-lg"><i className="fas fa-chevron-left"></i> กลับ</button>
            <h2 className="font-bold">สแกน QR จุดตรวจ</h2>
            <div className="w-10"></div>
          </div>
          <div className="flex-1 relative flex flex-col items-center justify-center overflow-hidden">
            <canvas ref={canvasRef} className="hidden"></canvas>
            <video ref={videoRef} className="absolute inset-0 w-full h-full object-cover"></video>
            <div className="relative w-64 h-64 border-2 border-blue-500 rounded-2xl z-10 bg-black/20 backdrop-blur-[2px]">
              <div className="absolute top-0 left-0 w-8 h-8 border-t-4 border-l-4 border-white rounded-tl-xl -mt-1 -ml-1"></div>
              <div className="absolute top-0 right-0 w-8 h-8 border-t-4 border-r-4 border-white rounded-tr-xl -mt-1 -mr-1"></div>
              <div className="absolute bottom-0 left-0 w-8 h-8 border-b-4 border-l-4 border-white rounded-bl-xl -mb-1 -ml-1"></div>
              <div className="absolute bottom-0 right-0 w-8 h-8 border-b-4 border-r-4 border-white rounded-br-xl -mb-1 -mr-1"></div>
            </div>
            <p className="text-white text-sm text-center px-4 mt-8 z-10 drop-shadow-md bg-black/50 py-2 px-4 rounded-full">เล็งกล้องไปที่ QR Code ประจำจุดตรวจ</p>
            
            {scanError && (
              <div className="absolute inset-0 z-50 bg-slate-900/95 backdrop-blur-sm flex flex-col items-center justify-center p-6 text-center">
                <div className="bg-white/10 p-6 rounded-full mb-6">
                  <i className="fas fa-camera-slash text-5xl text-red-400"></i>
                </div>
                <h3 className="text-white text-2xl font-bold mb-3">ไม่สามารถเปิดกล้องได้</h3>
                <p className="text-slate-300 mb-8 max-w-sm text-sm md:text-base leading-relaxed">{scanError}</p>

                <div className="flex gap-3 w-full max-w-sm">
                   <button onClick={() => { setView('home'); setTimeout(() => setView('scanner'), 100); }} className="flex-1 bg-blue-600 text-white py-3 md:py-4 rounded-xl font-bold hover:bg-blue-700 active:scale-95 transition-all text-sm md:text-base shadow-lg flex flex-col items-center justify-center gap-1">
                     <i className="fas fa-sync-alt text-lg"></i> เปิดกล้องใหม่
                   </button>
                   <button onClick={() => setView('home')} className="flex-1 bg-slate-700 text-white py-3 md:py-4 rounded-xl font-bold hover:bg-slate-600 active:scale-95 transition-all text-sm md:text-base shadow-lg flex flex-col items-center justify-center gap-1">
                     กลับหน้าแรก
                   </button>
                </div>
              </div>
            )}
            
            {!scanError && (
               <button onClick={handleSimulateScan} className="absolute bottom-6 right-6 bg-white/20 hover:bg-white/40 text-white p-4 rounded-full backdrop-blur-md z-10 transition" title="จำลองการสแกนพบจุดตรวจ">
                 <i className="fas fa-qrcode text-[24px]"></i>
               </button>
            )}
          </div>
        </div>
      );

      const renderForm = () => (
        <div className="flex flex-col h-full bg-slate-50 overflow-y-auto pb-4">
          <div className="bg-blue-600 text-white p-6 pt-8 rounded-b-3xl shadow-md">
            <div className="flex items-center gap-2 mb-2"><i className="fas fa-map-marker-alt text-[20px] opacity-80"></i><h2 className="text-sm font-medium opacity-80">จุดตรวจปัจจุบัน</h2></div>
            <h1 className="text-2xl font-bold">{currentCheckpoint}</h1>
            <div className="mt-4 flex items-center gap-2 text-sm bg-white/20 inline-flex px-3 py-1 rounded-full"><i className="fas fa-user text-[14px]"></i><span>ผู้ตรวจ: {guardName}</span></div>
          </div>

          <form onSubmit={handleSubmit} className="p-4 space-y-6 mt-2">
            <div className="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
              <label className="block font-bold text-slate-800 mb-3">สถานการณ์ ณ จุดตรวจ</label>
              <div className="grid grid-cols-2 gap-3">
                <button type="button" onClick={() => setStatus('ปกติ')} className={`p-3 rounded-xl border flex flex-col items-center justify-center gap-2 transition-all ${status === 'ปกติ' ? 'bg-green-50 border-green-500 text-green-700 ring-1 ring-green-500' : 'bg-white border-slate-200 text-slate-500'}`}>
                  <i className="fas fa-check-circle text-[24px]"></i><span className="font-semibold">ปกติ</span>
                </button>
                <button type="button" onClick={() => setStatus('ผิดปกติ')} className={`p-3 rounded-xl border flex flex-col items-center justify-center gap-2 transition-all ${status === 'ผิดปกติ' ? 'bg-red-50 border-red-500 text-red-700 ring-1 ring-red-500' : 'bg-white border-slate-200 text-slate-500'}`}>
                  <i className="fas fa-exclamation-triangle text-[24px]"></i><span className="font-semibold">ผิดปกติ</span>
                </button>
              </div>
              {status === 'ผิดปกติ' && (
                <div className="mt-4 animate-in fade-in slide-in-from-top-2">
                  <label className="block text-sm text-slate-600 mb-1">ระบุเหตุที่พบ</label>
                  <textarea required value={issueDetail} onChange={(e) => setIssueDetail(e.target.value)} className="w-full p-3 border border-red-300 rounded-xl focus:ring-2 focus:ring-red-500" placeholder="เช่น หลอดไฟขาด, มีรอยงัดแงะ..." rows="2"></textarea>
                </div>
              )}
            </div>

            <div className="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
              <label className="block font-bold text-slate-800 mb-3">พบประตูห้องพักเปิดอยู่หรือไม่?</label>
              <div className="flex gap-4 mb-2">
                <label className="flex items-center gap-2 cursor-pointer"><input type="radio" name="door" value="ไม่มี" checked={doorOpen === 'ไม่มี'} onChange={() => setDoorOpen('ไม่มี')} className="w-5 h-5 text-blue-600" /><span className="text-slate-700">ไม่มี</span></label>
                <label className="flex items-center gap-2 cursor-pointer"><input type="radio" name="door" value="มี" checked={doorOpen === 'มี'} onChange={() => setDoorOpen('มี')} className="w-5 h-5 text-red-600" /><span className="text-slate-700">มี (เปิดอยู่)</span></label>
              </div>
              {doorOpen === 'มี' && (
                <div className="mt-3 animate-in fade-in slide-in-from-top-2">
                  <input type="text" required value={roomNumber} onChange={(e) => setRoomNumber(e.target.value)} placeholder="โปรดระบุหมายเลขห้องพัก" className="w-full p-3 border border-red-300 rounded-xl focus:ring-2 focus:ring-red-500" />
                </div>
              )}
            </div>

            <div className="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
              <div className="flex justify-between items-center mb-3">
                <label className="font-bold text-slate-800">ภาพถ่าย ณ จุดตรวจ <span className="text-red-500 text-sm">*</span></label>
                <span className={`text-sm font-semibold ${photos.length === 10 ? 'text-red-500' : 'text-slate-500'}`}>{photos.length}/10</span>
              </div>
              <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
                {photos.map((photoUrl, index) => (
                  <div key={index} className="relative aspect-square">
                    <img src={photoUrl} className="w-full h-full object-cover rounded-xl border border-slate-200" />
                    <button type="button" onClick={() => removePhoto(index)} className="absolute -top-2 -right-2 bg-red-500 text-white w-7 h-7 flex items-center justify-center rounded-full shadow-md hover:bg-red-600 transition-colors z-10"><i className="fas fa-times text-[14px]"></i></button>
                  </div>
                ))}
                {photos.length < 10 && (
                  <label className={`flex flex-col items-center justify-center aspect-square border-2 border-dashed border-slate-300 rounded-xl cursor-pointer hover:bg-slate-50 transition-colors ${isCompressing ? 'bg-slate-100 opacity-50 cursor-wait' : 'bg-slate-50/50'}`}>
                    <div className="flex flex-col items-center justify-center p-2 text-center">
                      {isCompressing ? (
                        <><i className="fas fa-spinner fa-spin text-[24px] text-blue-500 mb-2"></i><p className="text-[10px] text-blue-600 font-bold">รอสักครู่...</p></>
                      ) : (
                        <><i className="fas fa-camera text-[24px] text-slate-400 mb-2"></i><p className="text-xs text-slate-500 font-semibold">{photos.length === 0 ? 'แตะถ่ายภาพ' : 'เพิ่มรูป'}</p></>
                      )}
                    </div>
                    <input type="file" accept="image/*" capture="environment" multiple className="hidden" onChange={handlePhotoCapture} disabled={isSubmitting || isCompressing} />
                  </label>
                )}
              </div>
            </div>

            <button 
              type="submit" 
              disabled={isSubmitting || isCompressing || photos.length === 0} 
              className={`w-full text-white font-bold py-4 rounded-xl shadow-lg transition-all text-lg flex items-center justify-center gap-2 ${(isSubmitting || isCompressing || photos.length === 0) ? 'bg-slate-400 cursor-not-allowed' : 'bg-blue-600 shadow-blue-200 hover:bg-blue-700 active:scale-95'}`}
            >
              {isCompressing ? <><i className="fas fa-spinner fa-spin text-[20px]"></i> กำลังบีบอัดรูปภาพ...</> :
               isSubmitting ? <><i className="fas fa-spinner fa-spin text-[20px]"></i> กำลังบันทึก...</> : 
               photos.length === 0 ? <><i className="fas fa-camera text-[20px]"></i> กรุณาแนบรูปภาพ</> : 
               <><i className="fas fa-save text-[20px]"></i> บันทึกข้อมูล</>}
            </button>
          </form>
        </div>
      );

      const renderHistory = () => {
        const filteredHistory = history.filter(h => {
          const recordDate = h.timestamp.split(' ')[0]; 
          return recordDate >= startDate && recordDate <= endDate;
        });

        return (
          <div className="flex flex-col h-full bg-slate-50">
            <div className="p-4 bg-white shadow-sm flex flex-col gap-3 sticky top-0 z-10">
              <div className="flex items-center justify-between">
                <h2 className="font-bold text-lg text-slate-800 flex items-center gap-2">
                  ประวัติทั้งหมด ({filteredHistory.length})
                  {isLoadingData && <i className="fas fa-circle-notch fa-spin text-blue-500 text-sm"></i>}
                  {!isOnline && !isLoadingData && <span className="text-xs text-amber-500 font-medium bg-amber-50 px-2 py-0.5 rounded-md border border-amber-100"><i className="fas fa-exclamation-circle"></i> ออฟไลน์</span>}
                </h2>
                <div className="flex gap-2">
                  <button onClick={() => fetchCloudData()} className="w-8 h-8 rounded-lg bg-blue-50 text-blue-600 flex items-center justify-center hover:bg-blue-100" title="รีเฟรชข้อมูล">
                    <i className="fas fa-sync-alt"></i>
                  </button>
                  <button onClick={() => exportToCSV(filteredHistory)} disabled={filteredHistory.length === 0} className={`flex items-center gap-1 px-3 py-1.5 rounded-lg text-xs font-semibold transition-colors ${filteredHistory.length > 0 ? 'bg-green-100 text-green-700 hover:bg-green-200' : 'bg-slate-100 text-slate-400 cursor-not-allowed'}`}>
                    <i className="fas fa-file-excel text-[14px]"></i> ออก Excel
                  </button>
                </div>
              </div>
              
              <div className="flex gap-2">
                <div className="flex-1 bg-slate-50 rounded-xl p-2 border border-slate-200">
                  <div className="text-[10px] text-slate-500 mb-1 font-bold">จากวันที่</div>
                  <input 
                    type="date" 
                    value={startDate} 
                    onChange={(e) => setStartDate(e.target.value)}
                    className="w-full bg-transparent text-slate-800 text-sm outline-none border-none p-0 focus:ring-0"
                  />
                </div>
                <div className="flex-1 bg-slate-50 rounded-xl p-2 border border-slate-200">
                  <div className="text-[10px] text-slate-500 mb-1 font-bold">ถึงวันที่</div>
                  <input 
                    type="date" 
                    value={endDate} 
                    onChange={(e) => setEndDate(e.target.value)}
                    className="w-full bg-transparent text-slate-800 text-sm outline-none border-none p-0 focus:ring-0"
                  />
                </div>
              </div>
            </div>

            <div className="p-4 space-y-4 overflow-y-auto pb-4">
              {filteredHistory.length === 0 ? (
                <div className="text-center text-slate-500 mt-10">
                  <i className="fas fa-list text-[48px] mx-auto mb-4 block opacity-20"></i><p>ยังไม่มีข้อมูลการเดินตรวจในช่วงเวลานี้</p>
                </div>
              ) : (
                filteredHistory.map((item, idx) => (
                  <div key={item.id || idx} className="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                    <div className="flex justify-between items-start mb-2">
                      <h3 className="font-bold text-slate-800">{item.checkpoint}</h3>
                      <span className={`text-xs px-2 py-1 rounded-md font-semibold ${item.status === 'ปกติ' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>{item.status}</span>
                    </div>
                    <div className="text-sm text-slate-500 grid grid-cols-2 gap-y-1 mt-2">
                      <p>เวลา: <span className="text-slate-700">{item.timestamp}</span></p>
                      <p>ผู้ตรวจ: <span className="text-slate-700">{item.guardName}</span></p>
                      {item.status === 'ผิดปกติ' && <p className="col-span-2 text-red-600 mt-1 font-medium bg-red-50 p-2 rounded-lg"><i className="fas fa-info-circle mr-1"></i>เหตุ: {item.issueDetail}</p>}
                      {item.doorOpen === 'มี' && <p className="col-span-2 text-orange-600 mt-1 font-medium bg-orange-50 p-2 rounded-lg"><i className="fas fa-door-open mr-1"></i>ห้องเปิด: {item.roomNumber}</p>}
                      
                      {item.photos && item.photos.length > 0 ? (
                        <div className="col-span-2 mt-3 flex gap-2 overflow-x-auto pb-1 hide-scrollbar">
                          {item.photos.map((pic, pIdx) => {
                             const displayUrl = getDisplayImageUrl(pic);
                             if (!displayUrl || displayUrl.trim() === '') return null;
                             
                             return (
                               <img 
                                 key={pIdx} 
                                 src={displayUrl} 
                                 className="w-16 h-16 object-cover rounded-lg border border-slate-200 shrink-0 cursor-pointer shadow-sm img-thumbnail" 
                                 onClick={() => window.open(pic)} 
                                 alt="patrol"
                                 loading="lazy"
                                 onError={(e) => {
                                   if (displayUrl.includes('lh3.googleusercontent.com')) {
                                      const idMatch = pic.match(/id=([^&]+)/) || pic.match(/\/file\/d\/([^\/\?]+)/);
                                      if(idMatch) {
                                         e.target.src = `https://drive.google.com/uc?id=${idMatch[1]}`;
                                         e.target.onerror = (err) => {
                                            err.target.onerror = null;
                                            err.target.src = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="%23cbd5e1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>';
                                         };
                                         return;
                                      }
                                   }
                                   e.target.onerror = null; 
                                   e.target.src = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="%23cbd5e1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>'; 
                                 }}
                               />
                             )
                          })}
                        </div>
                      ) : (
                        <p className="col-span-2 text-slate-400 mt-1 flex items-center gap-1 text-xs"><i className="fas fa-image text-[12px]"></i> {item.photoText || 'ไม่มีรูปภาพ'}</p>
                      )}
                    </div>
                  </div>
                ))
              )}
            </div>
          </div>
        );
      };

      const renderAdminLogin = () => (
        <div className="flex flex-col h-full bg-slate-50 justify-center items-center p-6">
          <div className="bg-white p-8 rounded-3xl shadow-md border border-slate-200 w-full max-w-sm text-center animate-in fade-in zoom-in">
            <div className="w-20 h-20 bg-slate-800 text-white rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg"><i className="fas fa-lock text-[32px]"></i></div>
            <h2 className="text-xl font-bold text-slate-800 mb-2">เฉพาะผู้ดูแลระบบ</h2>
            <p className="text-sm text-slate-500 mb-6">รหัสผ่านเริ่มต้นคือ 1234</p>
            <form onSubmit={handleAdminLogin}>
              <input type="password" value={loginInput} onChange={(e) => setLoginInput(e.target.value)} placeholder="ใส่รหัสผ่าน (PIN)" className="w-full p-4 border-2 border-slate-200 rounded-xl mb-4 text-center text-xl tracking-widest focus:border-slate-800 focus:ring-0 transition-colors" autoFocus />
              <button type="submit" className="w-full bg-slate-800 text-white font-bold py-4 rounded-xl shadow-md hover:bg-slate-700 active:scale-95 transition-all">เข้าสู่ระบบ</button>
            </form>
            <button onClick={() => setView('home')} className="mt-6 text-sm text-slate-400 underline hover:text-slate-600">กลับหน้าแรก</button>
          </div>
        </div>
      );

      const renderSettings = () => {
        const listData = settingTab === 'checkpoints' ? checkpoints : guards;
        return (
          <div className="flex flex-col h-full bg-slate-50">
            <div className="p-4 bg-white shadow-sm sticky top-0 z-10">
              <div className="flex justify-between items-center mb-4">
                <h2 className="font-bold text-xl text-slate-800">ตั้งค่าระบบ <i className="fas fa-cloud text-blue-500 text-sm ml-1"></i></h2>
                <div className="flex gap-2">
                  <button onClick={() => setShowPasswordChange(true)} className="text-xs bg-slate-100 text-slate-600 px-3 py-1.5 rounded-lg hover:bg-slate-200 font-semibold transition-colors"><i className="fas fa-key mr-1"></i>เปลี่ยนรหัส</button>
                  <button onClick={() => {setIsAdminAuth(false); setView('home');}} className="text-xs bg-red-50 text-red-600 px-3 py-1.5 rounded-lg hover:bg-red-100 font-semibold transition-colors"><i className="fas fa-sign-out-alt mr-1"></i>ออก</button>
                </div>
              </div>

              <div className="flex bg-slate-100 p-1 rounded-xl">
                <button onClick={() => { setSettingTab('checkpoints'); setEditingId(null); }} className={`flex-1 py-2 text-sm font-semibold rounded-lg transition-all ${settingTab === 'checkpoints' ? 'bg-white shadow text-blue-600' : 'text-slate-500'}`}>จุดตรวจ</button>
                <button onClick={() => { setSettingTab('guards'); setEditingId(null); }} className={`flex-1 py-2 text-sm font-semibold rounded-lg transition-all ${settingTab === 'guards' ? 'bg-white shadow text-blue-600' : 'text-slate-500'}`}>รายชื่อ รปภ.</button>
              </div>
            </div>

            <div className="p-4 overflow-y-auto pb-4">
              {settingTab === 'checkpoints' && checkpoints.length > 0 && (
                <div className="mb-4">
                  <button onClick={handleExportAllQRs} className="w-full bg-emerald-600 text-white font-bold py-3 rounded-xl hover:bg-emerald-700 active:scale-95 transition-all flex items-center justify-center gap-2 shadow-sm">
                    <i className="fas fa-print"></i> พิมพ์ / ส่งออก QR Code ทั้งหมด
                  </button>
                </div>
              )}

              <form onSubmit={handleAddItem} className="flex gap-2 mb-6">
                <input type="text" value={newItemName} onChange={(e) => setNewItemName(e.target.value)} placeholder={`เพิ่ม${settingTab === 'checkpoints' ? 'จุดตรวจ' : 'รายชื่อ รปภ.'}ใหม่...`} className="flex-1 p-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500" />
                <button type="submit" disabled={!newItemName.trim()} className="bg-blue-600 text-white px-5 rounded-xl font-bold hover:bg-blue-700 disabled:bg-slate-300 transition-colors">เพิ่ม</button>
              </form>

              <div className="space-y-3">
                {listData.map((item) => (
                  <div key={item.id} className="bg-white p-3 rounded-xl shadow-sm border border-slate-200 flex items-center justify-between gap-2">
                    {editingId === item.id ? (
                      <div className="flex flex-1 gap-2">
                        <input type="text" value={editingValue} onChange={(e) => setEditingValue(e.target.value)} className="flex-1 p-2 border border-blue-300 rounded-lg text-sm focus:outline-none focus:ring-1 focus:ring-blue-500" autoFocus />
                        <button onClick={handleSaveEdit} className="bg-green-500 text-white w-8 h-8 rounded-lg flex items-center justify-center shadow-sm hover:bg-green-600"><i className="fas fa-check"></i></button>
                        <button onClick={() => setEditingId(null)} className="bg-slate-200 text-slate-600 w-8 h-8 rounded-lg flex items-center justify-center hover:bg-slate-300"><i className="fas fa-times"></i></button>
                      </div>
                    ) : (
                      <>
                        <span className="font-medium text-slate-700 flex-1 break-words">{item.name}</span>
                        <div className="flex gap-2">
                          {settingTab === 'checkpoints' && (
                            <button onClick={() => setShowQR(item.name)} className="w-8 h-8 flex items-center justify-center bg-blue-50 text-blue-600 rounded-lg hover:bg-blue-100"><i className="fas fa-qrcode"></i></button>
                          )}
                          <button onClick={() => handleStartEdit(item.id, item.name)} className="w-8 h-8 flex items-center justify-center bg-amber-50 text-amber-600 rounded-lg hover:bg-amber-100"><i className="fas fa-edit"></i></button>
                          <button onClick={() => handleDeleteItem(item.id)} className="w-8 h-8 flex items-center justify-center bg-red-50 text-red-500 rounded-lg hover:bg-red-100"><i className="fas fa-trash"></i></button>
                        </div>
                      </>
                    )}
                  </div>
                ))}
                {listData.length === 0 && <p className="text-center text-slate-400 py-4">ยังไม่มีข้อมูล</p>}
              </div>
            </div>

            {showQR && (
              <div className="absolute inset-0 z-50 bg-black/80 flex items-center justify-center p-6 animate-in fade-in">
                <div className="bg-white w-full max-w-sm rounded-3xl p-6 flex flex-col items-center text-center">
                  <h3 className="font-bold text-lg mb-2 text-slate-800 break-words">{showQR}</h3>
                  <p className="text-sm text-slate-500 mb-6">QR Code สำหรับจุดตรวจนี้</p>
                  <div className="bg-white p-2 border-4 border-slate-100 rounded-xl mb-6 shadow-sm">
                    <img src={`https://api.qrserver.com/v1/create-qr-code/?size=1000x1000&data=${encodeURIComponent(showQR)}`} alt="QR Code" className="w-48 h-48 object-contain" />
                  </div>
                  <div className="flex gap-3 w-full">
                    <button onClick={() => window.open(`https://api.qrserver.com/v1/create-qr-code/?size=1000x1000&data=${encodeURIComponent(showQR)}`, '_blank')} className="flex-1 bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 transition-colors flex items-center justify-center gap-2 shadow-sm">
                      <i className="fas fa-download"></i> โหลดรูป
                    </button>
                    <button onClick={() => setShowQR(null)} className="flex-1 bg-slate-800 text-white font-bold py-3 rounded-xl hover:bg-slate-700 transition-colors shadow-sm">ปิด</button>
                  </div>
                </div>
              </div>
            )}

            {showPasswordChange && (
              <div className="absolute inset-0 z-50 bg-black/80 flex items-center justify-center p-6 animate-in fade-in">
                <div className="bg-white w-full max-w-sm rounded-3xl p-6 flex flex-col shadow-xl">
                  <h3 className="font-bold text-lg mb-4 text-slate-800 text-center"><i className="fas fa-key text-blue-600 mr-2"></i> เปลี่ยนรหัสผ่าน</h3>
                  <form onSubmit={handleChangePassword}>
                    <label className="block text-sm font-semibold text-slate-700 mb-1">รหัสผ่านเดิม</label>
                    <input type="password" value={oldPasswordInput} onChange={(e) => setOldPasswordInput(e.target.value)} className="w-full p-3 border border-slate-300 rounded-xl mb-4 focus:ring-2 focus:ring-blue-500" required />
                    <label className="block text-sm font-semibold text-slate-700 mb-1">รหัสผ่านใหม่</label>
                    <input type="password" value={newPasswordInput} onChange={(e) => setNewPasswordInput(e.target.value)} className="w-full p-3 border border-slate-300 rounded-xl mb-6 focus:ring-2 focus:ring-blue-500" required />
                    <div className="flex gap-3">
                      <button type="button" onClick={() => {setShowPasswordChange(false); setOldPasswordInput(''); setNewPasswordInput('');}} className="flex-1 bg-slate-100 text-slate-600 font-bold py-3 rounded-xl hover:bg-slate-200">ยกเลิก</button>
                      <button type="submit" className="flex-1 bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700">บันทึก</button>
                    </div>
                  </form>
                </div>
              </div>
            )}
          </div>
        );
      };

      return (
        <div className="w-full h-[100dvh] bg-slate-200 flex justify-center items-center font-sans overflow-hidden">
          <div className="w-full max-w-md h-full sm:h-[95dvh] sm:max-h-[800px] sm:rounded-[2.5rem] sm:border-[8px] border-slate-800 bg-white overflow-hidden relative shadow-2xl flex flex-col">
            
            <div className="flex-1 overflow-hidden relative">
              {view === 'home' && renderHome()}
              {view === 'dashboard' && renderDashboard()}
              {view === 'scanner' && renderScanner()}
              {view === 'form' && renderForm()}
              {view === 'history' && renderHistory()}
              {view === 'settings' && (!isAdminAuth ? renderAdminLogin() : renderSettings())}
            </div>

            <div className="bg-white border-t border-slate-200 flex justify-between items-end px-2 p-2 pb-6 sm:pb-3 z-20">
              <button onClick={() => setView('home')} className={`flex-1 flex flex-col items-center gap-1 pb-1 transition-colors ${view === 'home' ? 'text-blue-600' : 'text-slate-400 hover:text-slate-600'}`}><i className="fas fa-home text-[20px]"></i><span className="text-[9px] font-bold">หน้าแรก</span></button>
              <button onClick={() => setView('dashboard')} className={`flex-1 flex flex-col items-center gap-1 pb-1 transition-colors ${view === 'dashboard' ? 'text-blue-600' : 'text-slate-400 hover:text-slate-600'}`}><i className="fas fa-chart-pie text-[20px]"></i><span className="text-[9px] font-bold">แดชบอร์ด</span></button>
              <div className="flex-1 flex justify-center relative -top-5">
                <button onClick={() => { if(!guardName) { alert('กรุณาเลือกชื่อ รปภ.'); setView('home'); return; } setView('scanner'); }} className="bg-blue-600 text-white w-14 h-14 rounded-full flex items-center justify-center shadow-lg shadow-blue-200 border-4 border-white hover:bg-blue-700 active:scale-95 transition-all"><i className="fas fa-qrcode text-[24px]"></i></button>
              </div>
              <button onClick={() => setView('history')} className={`flex-1 flex flex-col items-center gap-1 pb-1 transition-colors ${view === 'history' ? 'text-blue-600' : 'text-slate-400 hover:text-slate-600'}`}><i className="fas fa-list text-[20px]"></i><span className="text-[9px] font-bold">ประวัติ</span></button>
              <button onClick={() => setView('settings')} className={`flex-1 flex flex-col items-center gap-1 pb-1 transition-colors ${view === 'settings' ? 'text-blue-600' : 'text-slate-400 hover:text-slate-600'}`}><i className="fas fa-cog text-[20px]"></i><span className="text-[9px] font-bold">ตั้งค่า</span></button>
            </div>

            {selectedRecord && (
              <div className="absolute inset-0 z-[100] bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 animate-in fade-in">
                <div className="bg-white w-full max-w-sm rounded-3xl flex flex-col shadow-2xl overflow-hidden max-h-[90vh] animate-in zoom-in-95 duration-200">
                  <div className="bg-blue-600 p-4 text-white flex justify-between items-center shrink-0">
                     <h3 className="font-bold text-lg"><i className="fas fa-file-alt mr-2"></i>รายละเอียดการตรวจ</h3>
                     <button onClick={() => setSelectedRecord(null)} className="w-8 h-8 flex items-center justify-center rounded-full bg-white/20 hover:bg-white/30 transition-colors"><i className="fas fa-times"></i></button>
                  </div>
                  <div className="p-5 overflow-y-auto hide-scrollbar">
                     <h4 className="font-bold text-xl text-slate-800 mb-3 leading-tight">{selectedRecord.checkpoint}</h4>
                     
                     <div className="bg-slate-50 p-3.5 rounded-xl border border-slate-100 mb-4 text-sm space-y-2.5">
                        <div className="flex justify-between items-center">
                          <span className="text-slate-500"><i className="fas fa-info-circle w-5"></i> สถานะ</span>
                          <span className={`px-2.5 py-1 rounded-md font-bold text-xs ${selectedRecord.status === 'ปกติ' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>{selectedRecord.status}</span>
                        </div>
                        <div className="flex justify-between items-center">
                          <span className="text-slate-500"><i className="far fa-clock w-5"></i> เวลา</span>
                          <span className="font-semibold text-slate-700">{selectedRecord.timestamp}</span>
                        </div>
                        <div className="flex justify-between items-center">
                          <span className="text-slate-500"><i className="far fa-user w-5"></i> ผู้ตรวจ</span>
                          <span className="font-semibold text-slate-700">{selectedRecord.guardName}</span>
                        </div>
                     </div>

                     {selectedRecord.status === 'ผิดปกติ' && (
                        <div className="bg-red-50 p-4 rounded-xl mb-4 border border-red-100">
                           <p className="text-sm font-bold text-red-700 mb-1.5"><i className="fas fa-exclamation-triangle mr-1"></i> ระบุเหตุที่พบ</p>
                           <p className="text-sm text-red-600 leading-relaxed">{selectedRecord.issueDetail}</p>
                        </div>
                     )}

                     {selectedRecord.doorOpen === 'มี' && (
                        <div className="bg-orange-50 p-4 rounded-xl mb-4 border border-orange-100 flex justify-between items-center">
                           <div>
                             <p className="text-sm font-bold text-orange-700 mb-0.5"><i className="fas fa-door-open mr-1"></i> พบห้องพักเปิดอยู่</p>
                             <p className="text-xs text-orange-600">ตรวจสอบและดำเนินการ</p>
                           </div>
                           <div className="bg-orange-500 text-white px-3 py-2 rounded-xl text-lg font-bold shadow-sm">
                              {selectedRecord.roomNumber}
                           </div>
                        </div>
                     )}

                     <div>
                        <p className="font-bold text-sm text-slate-800 mb-3 flex items-center justify-between">
                          <span><i className="fas fa-camera text-slate-400 mr-1"></i> ภาพถ่ายแนบ</span>
                          <span className="text-xs font-semibold text-slate-500 bg-slate-100 px-2 py-0.5 rounded-full">{selectedRecord.photos ? selectedRecord.photos.length : 0} รูป</span>
                        </p>
                        {selectedRecord.photos && selectedRecord.photos.length > 0 ? (
                          <div className="grid grid-cols-2 gap-2">
                            {selectedRecord.photos.map((pic, pIdx) => {
                               const displayUrl = getDisplayImageUrl(pic);
                               if (!displayUrl || displayUrl.trim() === '') return null;
                               return <img key={pIdx} src={displayUrl} className="w-full aspect-square object-cover rounded-xl border border-slate-200 cursor-pointer hover:opacity-90 transition-opacity" onClick={() => window.open(pic)} alt="patrol" />
                            })}
                          </div>
                        ) : (
                          <div className="bg-slate-50 p-5 rounded-xl text-center border border-dashed border-slate-200">
                            <i className="fas fa-image text-slate-300 text-2xl mb-2"></i>
                            <p className="text-sm text-slate-400 font-medium">{selectedRecord.photoText || 'ไม่มีรูปภาพแนบ'}</p>
                          </div>
                        )}
                     </div>
                  </div>
                  <div className="p-4 border-t border-slate-100 bg-slate-50">
                    <button onClick={() => setSelectedRecord(null)} className="w-full bg-slate-800 text-white font-bold py-3 rounded-xl hover:bg-slate-700 active:scale-95 transition-all">ปิดหน้าต่าง</button>
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
